<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moonglow Hotel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        future: {
          // Wrap all hover: variants in @media (hover: hover) and (pointer: fine)
          // so hover styles never "stick" on touch devices after a tap.
          hoverOnlyWhenSupported: true,
        },
        theme: {
          extend: {
            colors: {
              background: "#F4FAFB",
              text:       "#040909",
              primary:    "#42ACC1",
              secondary:  "#8DD0DD",
              ui:         "#ECF2F3",
            },
            fontFamily: {
              sans: ["Roboto", "sans-serif"],
            },
            keyframes: {
              fadeIn: {
                from: { opacity: "0" },
                to:   { opacity: "1" },
              },
              zoomIn95: {
                from: { opacity: "0", transform: "scale(0.95)" },
                to:   { opacity: "1", transform: "scale(1)" },
              },
              slideFromTop: {
                from: { opacity: "0", transform: "translateY(-8px)" },
                to:   { opacity: "1", transform: "translateY(0)" },
              },
              shimmer: {
                "0%":   { transform: "translateX(-100%)" },
                "100%": { transform: "translateX(100%)" },
              },
            },
            animation: {
              "fade-in":      "fadeIn 200ms ease-out",
              "zoom-in-95":   "zoomIn95 200ms ease-out",
              "slide-top":    "slideFromTop 300ms ease-out",
              "shimmer":      "shimmer 1.5s ease-in-out infinite",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-background text-text antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
